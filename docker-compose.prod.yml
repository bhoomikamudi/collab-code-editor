# Production-style Compose stack with nginx reverse proxy.
# Local development should continue using docker-compose.yml (hot reload + direct ports).
#
# Usage:
#   cp deploy/env.prod.example .env
#   # edit .env with secure values
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml run --rm server npm run init-db

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLIENT_URL: ${CLIENT_URL}
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile.prod
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      CHROMA_DB_DIR: /app/chroma_data
      USE_MOCK_AI: ${USE_MOCK_AI:-true}
    volumes:
      - chroma_data:/app/chroma_data
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_WS_URL: ${VITE_WS_URL:-}
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    depends_on:
      - server
      - ai-service
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chroma_data:
